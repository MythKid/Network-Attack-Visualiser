name: CI

on:
  push:
  pull_request:

# Least privilege: the workflow only needs to read the repository contents.
permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install runtime and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint (ruff check)
        run: ruff check .

      - name: Ruff format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Pre-commit (lightweight hooks only)
        # Skip the two Ruff hooks: `ruff check` and `ruff format --check` already
        # ran above, so re-running them here would needlessly duplicate work.
        env:
          SKIP: ruff,ruff-format
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Compose validation (conditional until Phase 6)
        # docker-compose.yml is introduced in Phase 6. Until it exists, validate
        # only if a recognised Compose file is present; otherwise skip cleanly.
        # From Phase 6 onward this step becomes an always-on gate.
        run: |
          set -euo pipefail
          compose_file=""
          for f in docker-compose.yml docker-compose.yaml compose.yml compose.yaml; do
            if [ -f "$f" ]; then
              compose_file="$f"
              break
            fi
          done
          if [ -n "$compose_file" ]; then
            echo "Found ${compose_file} — validating with 'docker compose config'."
            docker compose -f "$compose_file" config >/dev/null
            echo "Compose file is valid."
          else
            echo "No Compose file present yet (introduced in Phase 6) — skipping Compose validation."
          fi

  frontend:
    name: Frontend lint, type-check, test and build
    runs-on: ubuntu-latest

    # All npm work happens inside frontend/; the Node major is pinned by
    # frontend/.nvmrc as the single source of truth (used here and locally).
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc -b --noEmit)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test -- --run

      - name: Build (tsc -b && vite build)
        run: npm run build
